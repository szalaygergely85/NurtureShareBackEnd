spring.datasource.url=jdbc:h2:mem:nurturesharedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
server.port=8080
# Dev-only signing key. NEVER used in production — the prod profile requires
# the JWT_SECRET environment variable instead.
app.jwt.secret=${JWT_SECRET:dev-only-insecure-signing-key-change-me-min-32-bytes-long}
