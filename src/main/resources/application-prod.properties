# Required in production — the app fails to start if JWT_SECRET is unset.
app.jwt.secret=${JWT_SECRET}
# Restrict CORS to known origins in production (comma-separated).
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://app.nurtureshare.com}
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
server.port=${PORT:8080}
