spring.application.name=nurtureshare-backend
# Default profile for LOCAL development only.
# Production MUST set the SPRING_PROFILES_ACTIVE=prod environment variable
# (an env var overrides this value).
spring.profiles.active=dev
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:604800000}
# The JWT signing secret is defined per-profile (dev/prod) so the production
# key is never committed. Production sources it from the JWT_SECRET env var.
